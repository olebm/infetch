name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

# Cancel superseded runs per PR (a push burst must not spawn parallel reviews).
concurrency:
  group: ai-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && !github.event.pull_request.draft) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@review'))
    steps:
      # Only the script is needed — the diff is fetched from the GitHub API,
      # not from local VCS state, so no full checkout / dependency install.
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/scripts
            .nvmrc
          sparse-checkout-cone-mode: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - name: Run AI Code Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Repo secret. Missing key => quiet skip (never blocks PRs).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REVIEW_MODEL: ${{ vars.REVIEW_MODEL || 'claude-haiku-4-5-20251001' }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
        run: node .github/scripts/ai-review.mjs

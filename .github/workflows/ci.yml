name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run TypeScript compiler
        run: npx tsc --noEmit

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Audit production dependencies (fail on high/critical)
        run: npm audit --omit=dev --audit-level=high

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run database migrations
        run: |
          psql "$DATABASE_URL" -f supabase/migrations/0001_initial_schema.sql
          psql "$DATABASE_URL" -f supabase/migrations/0003_stripe.sql
          psql "$DATABASE_URL" -f supabase/migrations/0014_business_tier.sql
          psql "$DATABASE_URL" -f supabase/migrations/0015_perf_indexes.sql
          psql "$DATABASE_URL" -f supabase/migrations/0016_stripe_idempotency.sql
          psql "$DATABASE_URL" -f supabase/migrations/0017_integration_targets_bool.sql
          psql "$DATABASE_URL" -f supabase/migrations/0018_stripe_event_ordering.sql
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      - name: Patch schema for CI (boolean columns + vault stub + seed data)
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
        run: |
          psql "$DATABASE_URL" <<'SQL'
          -- 0001_initial_schema.sql uses INTEGER for boolean columns (SQLite compat).
          -- Vanilla Postgres 16 rejects boolean literals for INTEGER columns.
          -- Must drop INTEGER defaults first because PostgreSQL cannot auto-cast
          -- the default expression (e.g. "1") to BOOLEAN during ALTER COLUMN TYPE.
          ALTER TABLE mail_accounts ALTER COLUMN secure DROP DEFAULT;
          ALTER TABLE mail_accounts ALTER COLUMN secure TYPE BOOLEAN USING (secure != 0);
          ALTER TABLE mail_accounts ALTER COLUMN secure SET DEFAULT true;

          ALTER TABLE discovered_senders ALTER COLUMN blocked DROP DEFAULT;
          ALTER TABLE discovered_senders ALTER COLUMN blocked TYPE BOOLEAN USING (blocked != 0);
          ALTER TABLE discovered_senders ALTER COLUMN blocked SET DEFAULT false;

          ALTER TABLE auto_approval_rules ALTER COLUMN enabled DROP DEFAULT;
          ALTER TABLE auto_approval_rules ALTER COLUMN enabled TYPE BOOLEAN USING (enabled != 0);
          ALTER TABLE auto_approval_rules ALTER COLUMN enabled SET DEFAULT true;

          ALTER TABLE export_targets ALTER COLUMN enabled DROP DEFAULT;
          ALTER TABLE export_targets ALTER COLUMN enabled TYPE BOOLEAN USING (enabled != 0);
          ALTER TABLE export_targets ALTER COLUMN enabled SET DEFAULT false;

          -- Schema-Teil aus 0013_export_targets_per_org.sql (Migration wird in CI
          -- nicht eingespielt, da sie eine auth.uid()-RLS-Policy enthält; Tests
          -- laufen als Owner-Rolle "ci" und umgehen RLS ohnehin). Ohne diese
          -- Spalte schlagen die Export-Pipeline-Tests fehl
          -- (column "organization_id" does not exist).
          ALTER TABLE export_targets
            ADD COLUMN IF NOT EXISTS organization_id TEXT
            REFERENCES organizations(id) ON DELETE CASCADE;
          CREATE INDEX IF NOT EXISTS idx_export_targets_org
            ON export_targets(organization_id) WHERE organization_id IS NOT NULL;
          ALTER TABLE export_targets DROP CONSTRAINT IF EXISTS export_targets_target_key;
          CREATE UNIQUE INDEX IF NOT EXISTS uniq_export_targets_org_target
            ON export_targets (organization_id, target);

          -- Schema-Teil aus 0019_multitenant_isolation.sql / 0020_discovered_senders_per_org.sql
          -- (Migrationen werden in CI nicht eingespielt: Backfill-UPDATEs gegen die
          -- leere CI-DB sind sinnlos und 0019 RAISEt auf nicht-attribuierbare Rows;
          -- RLS-Policies nutzen auth.uid(), Tests laufen als Owner "ci" und umgehen
          -- RLS ohnehin). Ohne diese Spalten: column "organization_id" does not exist.
          ALTER TABLE invoice_files
            ADD COLUMN IF NOT EXISTS organization_id TEXT
            REFERENCES organizations(id) ON DELETE CASCADE;
          ALTER TABLE invoice_files DROP CONSTRAINT IF EXISTS invoice_files_sha256_key;
          CREATE UNIQUE INDEX IF NOT EXISTS uniq_invoice_files_org_sha256
            ON invoice_files (organization_id, sha256);
          CREATE INDEX IF NOT EXISTS idx_invoice_files_org
            ON invoice_files (organization_id);

          ALTER TABLE vendor_month_status
            ADD COLUMN IF NOT EXISTS organization_id TEXT
            REFERENCES organizations(id) ON DELETE CASCADE;
          ALTER TABLE vendor_month_status
            DROP CONSTRAINT IF EXISTS vendor_month_status_vendor_id_year_month_key;
          CREATE UNIQUE INDEX IF NOT EXISTS uniq_vendor_month_status_org
            ON vendor_month_status (organization_id, vendor_id, year_month);
          CREATE INDEX IF NOT EXISTS idx_vendor_month_status_org
            ON vendor_month_status (organization_id);

          ALTER TABLE discovered_senders
            ADD COLUMN IF NOT EXISTS organization_id TEXT
            REFERENCES organizations(id) ON DELETE CASCADE;
          ALTER TABLE discovered_senders DROP CONSTRAINT IF EXISTS discovered_senders_from_address_key;
          CREATE UNIQUE INDEX IF NOT EXISTS uniq_discovered_senders_org_addr
            ON discovered_senders (organization_id, from_address);
          CREATE INDEX IF NOT EXISTS idx_discovered_senders_org
            ON discovered_senders (organization_id);

          ALTER TABLE auto_approval_rules
            ADD COLUMN IF NOT EXISTS organization_id TEXT
            REFERENCES organizations(id) ON DELETE CASCADE;
          CREATE INDEX IF NOT EXISTS idx_auto_approval_rules_org
            ON auto_approval_rules (organization_id);

          ALTER TABLE integration_targets
            ADD COLUMN IF NOT EXISTS organization_id TEXT
            REFERENCES organizations(id) ON DELETE CASCADE;
          ALTER TABLE integration_targets DROP CONSTRAINT IF EXISTS integration_targets_provider_key;
          CREATE UNIQUE INDEX IF NOT EXISTS uniq_integration_targets_org_provider
            ON integration_targets (organization_id, provider);
          CREATE INDEX IF NOT EXISTS idx_integration_targets_org
            ON integration_targets (organization_id);

          -- Minimal Supabase Vault stub — plain-text storage, no pgsodium required.
          CREATE SCHEMA IF NOT EXISTS vault;
          CREATE TABLE IF NOT EXISTS vault.secrets (
            id     UUID PRIMARY KEY DEFAULT gen_random_uuid(),
            name   TEXT NOT NULL UNIQUE,
            secret TEXT NOT NULL
          );
          CREATE VIEW vault.decrypted_secrets AS
            SELECT id, name, secret AS decrypted_secret FROM vault.secrets;
          CREATE OR REPLACE FUNCTION vault.create_secret(p_secret TEXT, p_name TEXT)
            RETURNS UUID LANGUAGE SQL AS $$
              INSERT INTO vault.secrets (name, secret) VALUES (p_name, p_secret) RETURNING id;
            $$;

          -- Vendor seed data required by matcher / self-healing / ai-extraction tests.
          INSERT INTO vendors (name, canonical_key, category) VALUES
            ('OpenAI',    'openai',    'software'),
            ('Anthropic', 'anthropic', 'software')
          ON CONFLICT (canonical_key) DO NOTHING;

          INSERT INTO vendor_aliases (vendor_id, alias, match_type)
          SELECT id, 'openai',        'contains' FROM vendors WHERE canonical_key = 'openai'
          UNION ALL
          SELECT id, 'openai.com',    'domain'   FROM vendors WHERE canonical_key = 'openai'
          UNION ALL
          SELECT id, 'anthropic',     'contains' FROM vendors WHERE canonical_key = 'anthropic'
          UNION ALL
          SELECT id, 'claude',        'contains' FROM vendors WHERE canonical_key = 'anthropic'
          UNION ALL
          SELECT id, 'anthropic.com', 'domain'   FROM vendors WHERE canonical_key = 'anthropic'
          ON CONFLICT DO NOTHING;
          SQL
      - name: Run unit tests
        run: npm run test
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    # Selbst-gehostet: Supabase-Stack + Next-Dev-Server im Job, kein Vercel-Preview.
    if: github.event_name == 'pull_request'
    needs: [lint, typecheck, test]
    env:
      # Dev-Server läuft auf :3456 (= Playwright-Default-baseURL).
      # next dev → NODE_ENV=development, daher ist /api/test/login aktiv
      # (next start würde NODE_ENV=production erzwingen → Route 404).
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3456
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3456
      ENABLE_TEST_LOGIN: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      SUPABASE_VERSION: "2.98.2"
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Start Supabase local stack
        run: npx --yes "supabase@${SUPABASE_VERSION}" start
      - name: Export Supabase connection env
        run: |
          set -euo pipefail
          npx --yes "supabase@${SUPABASE_VERSION}" status -o json > supabase-status.json
          node - <<'NODE'
          const fs = require("node:fs");
          const s = JSON.parse(fs.readFileSync("supabase-status.json", "utf8"));
          const map = {
            NEXT_PUBLIC_SUPABASE_URL: s.API_URL,
            NEXT_PUBLIC_SUPABASE_ANON_KEY: s.ANON_KEY,
            SUPABASE_SERVICE_ROLE_KEY: s.SERVICE_ROLE_KEY,
            DATABASE_URL: s.DB_URL,
          };
          const missing = Object.entries(map).filter(([, v]) => !v).map(([k]) => k);
          if (missing.length) {
            console.error("Missing Supabase status keys:", missing.join(", "));
            console.error("Available keys:", Object.keys(s).join(", "));
            process.exit(1);
          }
          fs.appendFileSync(
            process.env.GITHUB_ENV,
            Object.entries(map).map(([k, v]) => `${k}=${v}`).join("\n") + "\n",
          );
          NODE
      - name: Reconcile schema with app code (CI-only drift patch)
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f scripts/ci/reconcile-schema.sql
      - name: Start Next dev server
        run: |
          mkdir -p tests/e2e/.auth
          nohup npx next dev -H 127.0.0.1 -p 3456 --turbopack \
            > next-dev.log 2>&1 &
          echo $! > next-dev.pid
      - name: Wait for app + warm up routes
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            if curl -sf -o /dev/null "http://127.0.0.1:3456/login"; then
              echo "Dev server up after ${i}s"; break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Dev server did not start in time"; cat next-dev.log; exit 1
            fi
            sleep 1
          done
          # Routen vorkompilieren (Turbopack kompiliert on-demand) damit der
          # erste echte Test-Request nicht im 15s-Timeout des Setups hängt.
          for route in /login / /audit /einstellungen /konto /senders /invoices /exports /inbox; do
            curl -s -o /dev/null -L "http://127.0.0.1:3456${route}" || true
          done
      - name: Run E2E tests
        run: npx playwright test
      - name: Dump server log on failure
        if: failure()
        run: tail -n 200 next-dev.log || true
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  sentry-release:
    name: Sentry Release
    runs-on: ubuntu-latest
    # Nur auf main-Push auslösen — nicht auf PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check Sentry config
        id: cfg
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          if [ -n "$SENTRY_AUTH_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SENTRY_AUTH_TOKEN not set — skipping Sentry release (non-fatal)"
          fi
      - name: Create Sentry release
        if: steps.cfg.outputs.enabled == 'true'
        uses: getsentry/action-release@v1
        with:
          environment: production
          # Alle Commits seit letztem Release werden verknüpft (suspect commits)
          set_commits: auto
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

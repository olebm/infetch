name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run TypeScript compiler
        run: npx tsc --noEmit

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Audit production dependencies (fail on high/critical)
        run: npm audit --omit=dev --audit-level=high

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Pre-migration bootstrap (auth.uid + vault stubs for vanilla pg)
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f tests/fixtures/ci-bootstrap-pre.sql
      - name: Apply all migrations linearly (skip 0002 — supabase_vault unavailable)
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
        run: node scripts/apply-all-migrations.mjs "$DATABASE_URL" --skip=0002
      - name: Seed fixture data (vendors + aliases)
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f tests/fixtures/ci-bootstrap-seed.sql
      - name: Run unit tests
        run: npm run test
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

  migration-drift-gate:
    name: Migration Drift Gate
    runs-on: ubuntu-latest
    # Proves apply-all-migrations.mjs takes a pre-W5 prod snapshot forward
    # cleanly. This is the gate for the prod-migration PR (#9 in the sequence
    # tracked in issue #19).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5433/ci
      # Same UUID as supabase/migrations/0022_RUNBOOK.md / pre-0019-snapshot.sql
      DESIGNATED_ORG: 185109b5-4a88-44d1-ad22-73d6e8a47f8e
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Load pre-W5 snapshot (auth/vault stubs + 0001-0018 + orphan invoices)
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f tests/fixtures/pre-0019-snapshot.sql
      - name: Apply W5 migrations (0019→0023) via runner against the snapshot
        run: |
          node scripts/apply-all-migrations.mjs "$DATABASE_URL" \
            --snapshot-mode=prod-replay \
            --skip=0002 \
            --set app.designated_org="$DESIGNATED_ORG"
      - name: Phase-D verification queries (per 0022_RUNBOOK.md)
        run: |
          set -euo pipefail
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -X --csv -t <<'SQL' > phase-d.csv
            -- 1) All 6 tables that 0019/0020/0013 touch should have organization_id
            SELECT 'has_org_id_columns',
                   COUNT(*) FILTER (WHERE column_name = 'organization_id')
              FROM information_schema.columns
             WHERE table_schema = 'public'
               AND table_name IN (
                 'invoice_files','vendor_month_status','auto_approval_rules',
                 'integration_targets','discovered_senders','export_targets'
               );

            -- 2) Zero unattributed invoices after 0022 backfill
            SELECT 'invoices_null_org',
                   COUNT(*) FROM invoices WHERE organization_id IS NULL;

            -- 3) Zero unattributed auto_approval_rules
            SELECT 'rules_null_org',
                   COUNT(*) FROM auto_approval_rules WHERE organization_id IS NULL;

            -- 4) Per-org unique indexes from 0019/0020 created
            SELECT 'per_org_indexes',
                   COUNT(*) FROM pg_indexes
                  WHERE indexname IN (
                    'uniq_invoice_files_org_sha256',
                    'uniq_integration_targets_org_provider',
                    'uniq_discovered_senders_org_addr',
                    'uniq_vms_org_vendor_month'
                  );

            -- 5) Old global UNIQUE constraints dropped
            SELECT 'old_global_constraints',
                   COUNT(*) FROM pg_constraint WHERE conname IN (
                     'invoice_files_sha256_key','integration_targets_provider_key',
                     'vendor_month_status_vendor_id_year_month_key',
                     'discovered_senders_from_address_key'
                   );
          SQL

          echo "--- phase-d.csv ---"
          cat phase-d.csv
          echo "-------------------"

          # Expectations:
          #   has_org_id_columns    = 6
          #   invoices_null_org     = 0
          #   rules_null_org        = 0
          #   per_org_indexes       = 4
          #   old_global_constraints= 0
          fail=0
          while IFS=, read -r key val; do
            key=${key// /}; val=${val// /}
            case "$key" in
              has_org_id_columns)     [ "$val" = "6" ] || { echo "::error::$key=$val (expected 6)"; fail=1; } ;;
              invoices_null_org)      [ "$val" = "0" ] || { echo "::error::$key=$val (expected 0)"; fail=1; } ;;
              rules_null_org)         [ "$val" = "0" ] || { echo "::error::$key=$val (expected 0)"; fail=1; } ;;
              per_org_indexes)        [ "$val" = "4" ] || { echo "::error::$key=$val (expected 4)"; fail=1; } ;;
              old_global_constraints) [ "$val" = "0" ] || { echo "::error::$key=$val (expected 0)"; fail=1; } ;;
            esac
          done < phase-d.csv
          exit $fail

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    # Selbst-gehostet: Supabase-Stack + Next-Dev-Server im Job, kein Vercel-Preview.
    if: github.event_name == 'pull_request'
    needs: [lint, typecheck, test]
    env:
      # Dev-Server läuft auf :3456 (= Playwright-Default-baseURL).
      # next dev → NODE_ENV=development, daher ist /api/test/login aktiv
      # (next start würde NODE_ENV=production erzwingen → Route 404).
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3456
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3456
      ENABLE_TEST_LOGIN: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      SUPABASE_VERSION: "2.98.2"
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Start Supabase local stack
        run: npx --yes "supabase@${SUPABASE_VERSION}" start
      - name: Export Supabase connection env
        run: |
          set -euo pipefail
          npx --yes "supabase@${SUPABASE_VERSION}" status -o json > supabase-status.json
          node - <<'NODE'
          const fs = require("node:fs");
          const s = JSON.parse(fs.readFileSync("supabase-status.json", "utf8"));
          const map = {
            NEXT_PUBLIC_SUPABASE_URL: s.API_URL,
            NEXT_PUBLIC_SUPABASE_ANON_KEY: s.ANON_KEY,
            SUPABASE_SERVICE_ROLE_KEY: s.SERVICE_ROLE_KEY,
            DATABASE_URL: s.DB_URL,
          };
          const missing = Object.entries(map).filter(([, v]) => !v).map(([k]) => k);
          if (missing.length) {
            console.error("Missing Supabase status keys:", missing.join(", "));
            console.error("Available keys:", Object.keys(s).join(", "));
            process.exit(1);
          }
          fs.appendFileSync(
            process.env.GITHUB_ENV,
            Object.entries(map).map(([k, v]) => `${k}=${v}`).join("\n") + "\n",
          );
          NODE
      - name: Reconcile schema with app code (CI-only drift patch)
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f scripts/ci/reconcile-schema.sql
      - name: Start Next dev server
        run: |
          mkdir -p tests/e2e/.auth
          nohup npx next dev -H 127.0.0.1 -p 3456 --turbopack \
            > next-dev.log 2>&1 &
          echo $! > next-dev.pid
      - name: Wait for app + warm up routes
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            if curl -sf -o /dev/null "http://127.0.0.1:3456/login"; then
              echo "Dev server up after ${i}s"; break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Dev server did not start in time"; cat next-dev.log; exit 1
            fi
            sleep 1
          done
          # Routen vorkompilieren (Turbopack kompiliert on-demand) damit der
          # erste echte Test-Request nicht im 15s-Timeout des Setups hängt.
          for route in /login / /audit /einstellungen /konto /senders /invoices /exports /inbox; do
            curl -s -o /dev/null -L "http://127.0.0.1:3456${route}" || true
          done
      - name: Run E2E tests
        run: npx playwright test
      - name: Dump server log on failure
        if: failure()
        run: tail -n 200 next-dev.log || true
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  sentry-release:
    name: Sentry Release
    runs-on: ubuntu-latest
    # Nur auf main-Push auslösen — nicht auf PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check Sentry config
        id: cfg
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          if [ -n "$SENTRY_AUTH_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SENTRY_AUTH_TOKEN not set — skipping Sentry release (non-fatal)"
          fi
      - name: Create Sentry release
        if: steps.cfg.outputs.enabled == 'true'
        uses: getsentry/action-release@v1
        with:
          environment: production
          # Alle Commits seit letztem Release werden verknüpft (suspect commits)
          set_commits: auto
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run TypeScript compiler
        run: npx tsc --noEmit

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Audit production dependencies (fail on high/critical)
        run: npm audit --omit=dev --audit-level=high

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Pre-migration bootstrap (auth.uid + vault stubs for vanilla pg)
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f tests/fixtures/ci-bootstrap-pre.sql
      - name: Apply all migrations linearly (skip 0002 — supabase_vault unavailable)
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
        run: node scripts/apply-all-migrations.mjs "$DATABASE_URL" --skip=0002
      - name: Seed fixture data (vendors + aliases)
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f tests/fixtures/ci-bootstrap-seed.sql
      - name: Run unit tests
        run: npm run test
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    # Selbst-gehostet: Supabase-Stack + Next-Dev-Server im Job, kein Vercel-Preview.
    if: github.event_name == 'pull_request'
    needs: [lint, typecheck, test]
    env:
      # Dev-Server läuft auf :3456 (= Playwright-Default-baseURL).
      # next dev → NODE_ENV=development, daher ist /api/test/login aktiv
      # (next start würde NODE_ENV=production erzwingen → Route 404).
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3456
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3456
      ENABLE_TEST_LOGIN: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      SUPABASE_VERSION: "2.98.2"
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Start Supabase local stack
        run: npx --yes "supabase@${SUPABASE_VERSION}" start
      - name: Export Supabase connection env
        run: |
          set -euo pipefail
          npx --yes "supabase@${SUPABASE_VERSION}" status -o json > supabase-status.json
          node - <<'NODE'
          const fs = require("node:fs");
          const s = JSON.parse(fs.readFileSync("supabase-status.json", "utf8"));
          const map = {
            NEXT_PUBLIC_SUPABASE_URL: s.API_URL,
            NEXT_PUBLIC_SUPABASE_ANON_KEY: s.ANON_KEY,
            SUPABASE_SERVICE_ROLE_KEY: s.SERVICE_ROLE_KEY,
            DATABASE_URL: s.DB_URL,
          };
          const missing = Object.entries(map).filter(([, v]) => !v).map(([k]) => k);
          if (missing.length) {
            console.error("Missing Supabase status keys:", missing.join(", "));
            console.error("Available keys:", Object.keys(s).join(", "));
            process.exit(1);
          }
          fs.appendFileSync(
            process.env.GITHUB_ENV,
            Object.entries(map).map(([k, v]) => `${k}=${v}`).join("\n") + "\n",
          );
          NODE
      - name: Reconcile schema with app code (CI-only drift patch)
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f scripts/ci/reconcile-schema.sql
      - name: Start Next dev server
        run: |
          mkdir -p tests/e2e/.auth
          nohup npx next dev -H 127.0.0.1 -p 3456 --turbopack \
            > next-dev.log 2>&1 &
          echo $! > next-dev.pid
      - name: Wait for app + warm up routes
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            if curl -sf -o /dev/null "http://127.0.0.1:3456/login"; then
              echo "Dev server up after ${i}s"; break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Dev server did not start in time"; cat next-dev.log; exit 1
            fi
            sleep 1
          done
          # Routen vorkompilieren (Turbopack kompiliert on-demand) damit der
          # erste echte Test-Request nicht im 15s-Timeout des Setups hängt.
          for route in /login / /audit /einstellungen /konto /senders /invoices /exports /inbox; do
            curl -s -o /dev/null -L "http://127.0.0.1:3456${route}" || true
          done
      - name: Run E2E tests
        run: npx playwright test
      - name: Dump server log on failure
        if: failure()
        run: tail -n 200 next-dev.log || true
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  sentry-release:
    name: Sentry Release
    runs-on: ubuntu-latest
    # Nur auf main-Push auslösen — nicht auf PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check Sentry config
        id: cfg
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          if [ -n "$SENTRY_AUTH_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SENTRY_AUTH_TOKEN not set — skipping Sentry release (non-fatal)"
          fi
      - name: Create Sentry release
        if: steps.cfg.outputs.enabled == 'true'
        uses: getsentry/action-release@v1
        with:
          environment: production
          # Alle Commits seit letztem Release werden verknüpft (suspect commits)
          set_commits: auto
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

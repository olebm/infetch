name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run TypeScript compiler
        run: npx tsc --noEmit

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Audit production dependencies (fail on high/critical)
        run: npm audit --omit=dev --audit-level=high

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run database migrations
        run: |
          psql "$DATABASE_URL" -f supabase/migrations/0001_initial_schema.sql
          psql "$DATABASE_URL" -f supabase/migrations/0003_stripe.sql
          psql "$DATABASE_URL" -f supabase/migrations/0014_business_tier.sql
          psql "$DATABASE_URL" -f supabase/migrations/0015_perf_indexes.sql
          psql "$DATABASE_URL" -f supabase/migrations/0016_stripe_idempotency.sql
          psql "$DATABASE_URL" -f supabase/migrations/0017_integration_targets_bool.sql
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      - name: Patch schema for CI (boolean columns + vault stub + seed data)
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
        run: |
          psql "$DATABASE_URL" <<'SQL'
          -- 0001_initial_schema.sql uses INTEGER for boolean columns (SQLite compat).
          -- Vanilla Postgres 16 rejects boolean literals for INTEGER columns.
          -- Must drop INTEGER defaults first because PostgreSQL cannot auto-cast
          -- the default expression (e.g. "1") to BOOLEAN during ALTER COLUMN TYPE.
          ALTER TABLE mail_accounts ALTER COLUMN secure DROP DEFAULT;
          ALTER TABLE mail_accounts ALTER COLUMN secure TYPE BOOLEAN USING (secure != 0);
          ALTER TABLE mail_accounts ALTER COLUMN secure SET DEFAULT true;

          ALTER TABLE discovered_senders ALTER COLUMN blocked DROP DEFAULT;
          ALTER TABLE discovered_senders ALTER COLUMN blocked TYPE BOOLEAN USING (blocked != 0);
          ALTER TABLE discovered_senders ALTER COLUMN blocked SET DEFAULT false;

          ALTER TABLE auto_approval_rules ALTER COLUMN enabled DROP DEFAULT;
          ALTER TABLE auto_approval_rules ALTER COLUMN enabled TYPE BOOLEAN USING (enabled != 0);
          ALTER TABLE auto_approval_rules ALTER COLUMN enabled SET DEFAULT true;

          ALTER TABLE export_targets ALTER COLUMN enabled DROP DEFAULT;
          ALTER TABLE export_targets ALTER COLUMN enabled TYPE BOOLEAN USING (enabled != 0);
          ALTER TABLE export_targets ALTER COLUMN enabled SET DEFAULT false;

          -- Minimal Supabase Vault stub — plain-text storage, no pgsodium required.
          CREATE SCHEMA IF NOT EXISTS vault;
          CREATE TABLE IF NOT EXISTS vault.secrets (
            id     UUID PRIMARY KEY DEFAULT gen_random_uuid(),
            name   TEXT NOT NULL UNIQUE,
            secret TEXT NOT NULL
          );
          CREATE VIEW vault.decrypted_secrets AS
            SELECT id, name, secret AS decrypted_secret FROM vault.secrets;
          CREATE OR REPLACE FUNCTION vault.create_secret(p_secret TEXT, p_name TEXT)
            RETURNS UUID LANGUAGE SQL AS $$
              INSERT INTO vault.secrets (name, secret) VALUES (p_name, p_secret) RETURNING id;
            $$;

          -- Vendor seed data required by matcher / self-healing / ai-extraction tests.
          INSERT INTO vendors (name, canonical_key, category) VALUES
            ('OpenAI',    'openai',    'software'),
            ('Anthropic', 'anthropic', 'software')
          ON CONFLICT (canonical_key) DO NOTHING;

          INSERT INTO vendor_aliases (vendor_id, alias, match_type)
          SELECT id, 'openai',        'contains' FROM vendors WHERE canonical_key = 'openai'
          UNION ALL
          SELECT id, 'openai.com',    'domain'   FROM vendors WHERE canonical_key = 'openai'
          UNION ALL
          SELECT id, 'anthropic',     'contains' FROM vendors WHERE canonical_key = 'anthropic'
          UNION ALL
          SELECT id, 'claude',        'contains' FROM vendors WHERE canonical_key = 'anthropic'
          UNION ALL
          SELECT id, 'anthropic.com', 'domain'   FROM vendors WHERE canonical_key = 'anthropic'
          ON CONFLICT DO NOTHING;
          SQL
      - name: Run unit tests
        run: npm run test
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    # Nur auf PRs — Preview-URL ist Voraussetzung
    if: github.event_name == 'pull_request'
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Wait for Vercel Preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.2
        id: preview
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 300
      - name: Run E2E tests
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.preview.outputs.url }}
          ENABLE_TEST_LOGIN: "true"
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  sentry-release:
    name: Sentry Release
    runs-on: ubuntu-latest
    # Nur auf main-Push auslösen — nicht auf PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create Sentry release
        uses: getsentry/sentry-release-action@v3
        with:
          environment: production
          # Alle Commits seit letztem Release werden verknüpft (suspect commits)
          set_commits: auto
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
